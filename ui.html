<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Coupang 큐레이션</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 20px;
            background: #1e1e1e;
            color: #ffffff;
            margin: 0;
        }
        h2 {
            margin-top: 0;
            color: #40a651;
            font-size: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #2d2d2d;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #40a651;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        button:hover {
            background: #2e8a3f;
        }
        .note {
            font-size: 11px;
            color: #aaa;
            margin-top: 10px;
            line-height: 1.4;
        }
        .status {
            margin-top: 15px;
            font-size: 12px;
            color: #fc8181;
            text-align: center;
            word-break: break-all;
        }
        .success {
            color: #34d399;
        }
    </style>
</head>
<body>
    <h2>🚀 쿠팡 큐레이션 팩토리</h2>
    
    <label for="topic">큐레이션 주제</label>
    <input type="text" id="topic" placeholder="예: 봄맞이 자취생 꿀템 Top 5" value="직장인 피로회복 꿀템 Top 5" />

    <label for="apikey">Google Gemini API Key (무료)</label>
    <input type="password" id="apikey" placeholder="AI Studio에서 발급받은 키 입력" />

    <button id="generateBtn">기획 및 템플릿 찍어내기 (!)</button>
    <div id="statusMsg" class="status"></div>
    
    <div class="note">
        * 피그마 도화지 안에 이름이 <strong>#Template</strong>인 프레임 하나(텍스트 속성: #rank, #product_name, #description)가 준비되어 있어야 자동 파밍이 작동합니다.
    </div>

    <script>
        document.getElementById('generateBtn').onclick = async () => {
            const topic = document.getElementById('topic').value;
            const apikey = document.getElementById('apikey').value;
            const btn = document.getElementById('generateBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            if (!topic) { statusMsg.innerText = '주제를 입력해주세요!'; return; }
            if (!apikey) { statusMsg.innerText = 'Gemini API Key를 입력해주세요!'; return; }

            // 상태 변경
            btn.innerText = '제미나이가 머리를 쥐어짜는 중...';
            btn.style.background = '#444';
            statusMsg.className = 'status success';
            statusMsg.innerText = '(최신 2.5 버전 AI 모델 호출 중...)';

            try {
                // 제미나이에게 내릴 프롬프트 작성 (JSON 요구)
                const prompt = `제휴 마케팅을 위한 인스타그램 카드뉴스를 기획합니다.
주제: ${topic}
반드시 가장 잘 팔릴 것 같은 제품들만 선정해서 아래의 JSON 배열 형식을 무조건 지켜 대답해 주세요. (가장 바깥쪽 괄호는 [ ] 여야 합니다. 백틱이나 마크다운 없이 순수 JSON만 출력하세요.)
[
  {
    "rank": "1위",
    "product_name": "[브랜드] 매력적인 상품 이름",
    "description": "이 제품을 꼭 사야 하는 이유 (짧고 임팩트 있게)"
  }
]`;

                // 구글 서버에 현재 존재하는 최신 모델 gemini-2.5-flash 로 적용 완료
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apikey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: "너는 쿠팡 큐레이션 마케터야. JSON 형식만 출력해." }] },
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) throw new Error("API 에러: " + data.error.message);
                if (!data.candidates || data.candidates.length === 0) throw new Error("알 수 없는 이유로 제미나이가 답변을 주지 않았습니다.");
                
                // 제미나이의 텍스트 답변 파싱 (마크다운 포맷오류 방어를 위한 전처리)
                let rawText = data.candidates[0].content.parts[0].text;
                rawText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                const products = JSON.parse(rawText);
                
                statusMsg.innerText = '응답 성공! 템플릿 생성 지시를 내립니다...';
                
                // 피그마 메인 스레드(code.js)로 상품 데이터 발송
                parent.postMessage({ pluginMessage: { type: 'create-curation', products: products } }, '*');

            } catch (e) {
                // 에러 발생 시 UI에 즉시 노출
                console.error(e);
                statusMsg.className = 'status';
                statusMsg.innerText = `에러 상세 내용: ${e.message}`;
            } finally {
                // 버튼 원상복구
                btn.innerText = '기획 및 템플릿 찍어내기 (!)';
                btn.style.background = '#40a651';
            }
        };
    </script>
</body>
</html>
